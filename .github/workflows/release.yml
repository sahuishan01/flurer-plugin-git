name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - name: Bundle plugin
        run: |
          mkdir -p _plugin
          cp dist/index.js _plugin/
          cp plugin.json _plugin/
          cp package.json _plugin/
          cd _plugin && zip -r ../flurer-plugin-git.zip .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: flurer-plugin-git ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: flurer-plugin-git.zip
          generate_release_notes: true